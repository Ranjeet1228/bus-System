<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Route System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-600">🚌 Bus Route System</h1>

        <!-- Cities Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Cities</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="cities-list">
                <!-- Cities will be populated by JavaScript -->
            </div>
        </div>

        <!-- Routes Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Bus Routes</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="px-4 py-2 text-left text-gray-600">From</th>
                            <th class="px-4 py-2 text-left text-gray-600">To</th>
                            <th class="px-4 py-2 text-left text-gray-600">Distance (km)</th>
                        </tr>
                    </thead>
                    <tbody id="routes-table">
                        <!-- Routes will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Find Route Section -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Ticket Price</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="source" class="block text-sm font-medium text-gray-700 mb-2">Source City</label>
                    <select id="source" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <!-- Options will be populated by JavaScript -->
                    </select>
                </div>
                <div>
                    <label for="destination" class="block text-sm font-medium text-gray-700 mb-2">Destination City</label>
                    <select id="destination" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <!-- Options will be populated by JavaScript -->
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="passengers" class="block text-sm font-medium text-gray-700 mb-2">Number of Customers</label>
                    <input id="passengers" type="number" min="1" value="1" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
            </div>
            <button id="find-route-btn" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                Find Route
            </button>
            <div id="route-result" class="mt-4 p-4 bg-gray-50 rounded-md hidden">
                <!-- Result will be shown here -->
            </div>
        </div>
    </div>

    <script>
        // Bus Route Data
        const cities = [
            "Delhi",
            "Noida",
            "Ghaziabad",
            "Meerut",
            "Haridwar"
        ];

        const routes = [
            { from: 0, to: 1, distance: 4 },
            { from: 1, to: 2, distance: 3 },
            { from: 2, to: 3, distance: 2 },
            { from: 3, to: 4, distance: 5 },
            { from: 0, to: 2, distance: 10 }
        ];

        // Graph implementation
        class Graph {
            constructor(n) {
                this.n = n;
                this.adj = Array.from({ length: n }, () => []);
            }

            addEdge(u, v, d) {
                this.adj[u].push({ v, distance: d });
                this.adj[v].push({ v: u, distance: d });
            }

            shortestPath(src, dest) {
                const dist = Array(this.n).fill(Infinity);
                const parent = Array(this.n).fill(-1);
                dist[src] = 0;

                const pq = [];
                pq.push({ distance: 0, node: src });

                while (pq.length > 0) {
                    pq.sort((a, b) => a.distance - b.distance);
                    const { distance: d, node: u } = pq.shift();

                    if (d > dist[u]) continue;

                    for (const edge of this.adj[u]) {
                        const v = edge.v;
                        const newDist = d + edge.distance;
                        if (newDist < dist[v]) {
                            dist[v] = newDist;
                            parent[v] = u;
                            pq.push({ distance: newDist, node: v });
                        }
                    }
                }

                const path = [];
                for (let v = dest; v !== -1; v = parent[v]) {
                    path.push(v);
                }
                path.reverse();
                return { path, distance: dist[dest] };
            }
        }

        // Initialize graph
        const graph = new Graph(cities.length);
        routes.forEach(route => {
            graph.addEdge(route.from, route.to, route.distance);
        });

        // Populate cities
        const citiesList = document.getElementById('cities-list');
        cities.forEach((city, index) => {
            const cityDiv = document.createElement('div');
            cityDiv.className = 'bg-blue-100 p-4 rounded-lg text-center';
            cityDiv.innerHTML = `<div class="font-semibold text-blue-800">${index}</div><div class="text-gray-600">${city}</div>`;
            citiesList.appendChild(cityDiv);
        });

        // Populate routes table
        const routesTable = document.getElementById('routes-table');
        routes.forEach(route => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="px-4 py-2 border-b">${cities[route.from]}</td>
                <td class="px-4 py-2 border-b">${cities[route.to]}</td>
                <td class="px-4 py-2 border-b">${route.distance} km</td>
            `;
            routesTable.appendChild(row);
        });

        // Populate select options
        const sourceSelect = document.getElementById('source');
        const destinationSelect = document.getElementById('destination');
        cities.forEach((city, index) => {
            const option1 = document.createElement('option');
            option1.value = index;
            option1.textContent = city;
            sourceSelect.appendChild(option1);

            const option2 = document.createElement('option');
            option2.value = index;
            option2.textContent = city;
            destinationSelect.appendChild(option2);
        });

        // Find route functionality
        document.getElementById('find-route-btn').addEventListener('click', () => {
            const src = parseInt(sourceSelect.value);
            const dest = parseInt(destinationSelect.value);
            const passengers = parseInt(document.getElementById('passengers').value) || 1;
            const farePerKm = 3;
            const result = graph.shortestPath(src, dest);
            const resultDiv = document.getElementById('route-result');

            if (result.distance === Infinity) {
                resultDiv.innerHTML = '<p class="text-red-600">No route found between the selected cities.</p>';
            } else {
                const pathNames = result.path.map(index => cities[index]);
                const totalFare = result.distance * farePerKm * passengers;
                resultDiv.innerHTML = `
                    <p class="text-green-600 font-semibold">Shortest Route Found!</p>
                    <p><strong>Path:</strong> ${pathNames.join(' → ')}</p>
                    <p><strong>Total Distance:</strong> ${result.distance} km</p>
                    <p><strong>Fare per km:</strong> Rs ${farePerKm}</p>
                    <p><strong>Number of Customers:</strong> ${passengers}</p>
                    <p class="mt-2 text-lg font-semibold"><strong>Total Fare:</strong> Rs ${totalFare}</p>
                `;
            }
            resultDiv.classList.remove('hidden');
        });
    </script>
</body>
</html>
